<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admiro admin - Liste des administrateurs">
  <meta name="keywords" content="admin, administrateurs, liste, template">
  <meta name="author" content="pixelstrap">
  <title>Liste des Administrateurs</title>
</head>
<body>
  <div class="app-wrapper d-flex">
   
    <app-menu></app-menu>

    <main class="main-content flex-fill p-0">
     
      <app-header></app-header>

      
      <div class="container-fluid mt-0">
    
        <div class="page-title mb-4">
          <div class="row">
            <div class="col-sm-6 col-12">
              <h2>Liste des Administrateurs</h2>
            </div>
          </div>
        </div>

        <div class="container-fluid table-space basic_table p-0">
          <div class="row">
            <div class="col-sm-12">
              <div class="card overflow-hidden">
                <div class="table-responsive">
                  <table class="table">
                    <thead>
                      <tr class="border-bottom-secondary border-top-0">
                        <th scope="col">Id</th>
                        <th scope="col">Nom</th>
                        <th scope="col">Prénom</th>
                        <th scope="col">Email</th>
                        <th scope="col">Rôle</th>
                        <th scope="col">Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr *ngFor="let admin of listeAdmin" class="border-bottom-success">
                        <td>{{ admin.id }}</td>
                        <td>{{ admin.nom }}</td>
                        <td>{{ admin.prenom }}</td>
                        <td>{{ admin.email }}</td>
                        <td>{{ admin.role }}</td>
                        <td>
                          <span *ngIf="role === 'super admin'">
                            <a [routerLink]="['/modifieradmin', admin.id]" class="btn btn-modifier me-2">
                              Modifier
                            </a>
                            <button type="button" class="btn btn-delete" (click)="DeleteAdmin(admin)">
                              Supprimer
                            </button>
                          </span>
                          <span *ngIf="role !== 'super admin'">—</span>
                        </td>
                      </tr>
                      <tr *ngIf="listeAdmin.length === 0">
                        <td colspan="6" class="text-center">Aucun administrateur trouvé</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <app-footer></app-footer>
    </main>
  </div>
</body>
</html>
