<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier un médecin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app-wrapper d-flex">
        <app-menu></app-menu>

        <main class="main-content flex-fill p-4">
            <app-header></app-header>

            <div class="row justify-content-center mt-4">
                <div class="col-lg-8 col-xl-7">
                    <div class="card-modern p-4">
                        <!-- Titre avec icône -->
                        <h5 class="fw-bold mb-4 d-flex align-items-center gap-2">
                            <i class="fas fa-user-md fs-3" style="color: var(--primary);"></i>
                            Modifier un médecin
                        </h5>

                        <!-- Formulaire -->
                        <form [formGroup]="medecinForm" (ngSubmit)="updateMedecin()">
                            <div class="row g-4">
                                <!-- Nom -->
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Nom</label>
                                    <div class="input-icon">
                                        <i class="fas fa-user"></i>
                                        <input type="text" class="form-control form-control-lg"
                                               formControlName="nom" placeholder="">
                                    </div>
                                </div>

                                <!-- Prénom -->
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Prénom</label>
                                    <div class="input-icon">
                                        <i class="fas fa-user"></i>
                                        <input type="text" class="form-control form-control-lg"
                                               formControlName="prenom" placeholder="">
                                    </div>
                                </div>

                                <!-- Email -->
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Email</label>
                                    <div class="input-icon">
                                        <i class="fas fa-envelope"></i>
                                        <input type="email" class="form-control form-control-lg"
                                               formControlName="email" placeholder="@exemple.com">
                                    </div>
                                </div>

                                <!-- Mot de passe -->
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Mot de passe</label>
                                    <div class="input-icon">
                                        <i class="fas fa-lock"></i>
                                        <input type="password" class="form-control form-control-lg"
                                               formControlName="mdp" placeholder="··········">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Spécialité</label>
                                    <div class="input-icon">
                                        <i class="fas fa-stethoscope"></i>
                                        <input type="text" class="form-control form-control-lg"
                                               formControlName="specialite" placeholder="Cardiologue">
                                    </div>
                                </div>

                               
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Téléphone</label>
                                    <div class="input-icon">
                                        <i class="fas fa-phone-alt"></i>
                                        <input type="text" class="form-control form-control-lg"
                                               formControlName="numeroTel" placeholder="+33 1 23 45 67 89">
                                    </div>
                                </div>

                                
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Adresse</label>
                                    <div class="input-icon">
                                        <i class="fas fa-map-marker-alt"></i>
                                        <input type="text" class="form-control form-control-lg"
                                               formControlName="adresseM" placeholder="123 rue de la Médecine, Paris">
                                    </div>
                                </div>

                              
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Statut</label>
                                    <div class="input-icon">
                                        <i class="fas fa-toggle-on"></i>
                                        <select class="form-select form-select-lg" formControlName="status">
                                            <option value="">-- Sélectionner un statut --</option>
                                            <option value="ACTIF">Actif</option>
                                            <option value="INACTIF">Inactif</option>
                                        </select>
                                    </div>
                                </div>

                                
                                <div class="col-12 mt-4 d-flex gap-3 justify-content-end">
                                    <button type="reset" class="btn btn-outline-primary rounded-pill px-4 py-2 d-flex align-items-center">
                                        <i class="fas fa-times me-2"></i> Annuler
                                    </button>
                                    <button type="submit" class="btn btn-primary rounded-pill px-4 py-2 d-flex align-items-center shadow-sm">
                                        <i class="fas fa-check me-2"></i> Modifier
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- PIED DE PAGE -->
            <app-footer></app-footer>
        </main>
    </div>
</body>
</html>
